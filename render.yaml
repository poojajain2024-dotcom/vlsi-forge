# VLSI Forge — Render.com deploy blueprint (one click via "New > Blueprint")
# Creates: a free Postgres database, the FastAPI backend, and the static website.
databases:
  - name: vlsi-forge-db
    plan: free

services:
  # ---- Backend API (FastAPI) ----
  - type: web
    name: vlsi-forge-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vlsi-forge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_NAME
        value: VLSI Forge API
      - key: ENV
        value: production
      # After the static site is live, set this to its URL so the browser can call the API.
      - key: CORS_ORIGINS
        sync: false

  # ---- Website (static files) ----
  - type: web
    name: vlsi-forge-web
    runtime: static
    plan: free
    staticPublishPath: ./web
    # SPA-style fallback so deep links still resolve to the app shell.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
